services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nutrition_system
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # SQL chạy theo thứ tự tên file khi container khởi tạo lần đầu
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./backend/src/db/migration_phase2.sql:/docker-entrypoint-initdb.d/02_migration_phase2.sql:ro
      - ./backend/src/db/migration_chat_history.sql:/docker-entrypoint-initdb.d/03_migration_chat_history.sql:ro
      - ./backend/src/db/seed.sql:/docker-entrypoint-initdb.d/04_seed.sql:ro
      - ./backend/src/db/migration_foods.sql:/docker-entrypoint-initdb.d/05_migration_foods.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nutrition_system"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5433:5432"

  frontend:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8099:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      # Ghi đè DB_HOST trong .env để trỏ đúng vào service db
      DB_HOST: db
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  postgres_data:
